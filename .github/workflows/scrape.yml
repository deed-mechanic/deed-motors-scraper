name: DEED MOTORS 価格自動更新
on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
jobs:
  scrape-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: ライブラリインストール
        run: pip install cloudscraper beautifulsoup4 lxml requests
      - name: スクレイピング実行
        run: python3 scripts/scraper.py
        continue-on-error: true
      - name: HTML生成（日本語版）
        run: mkdir -p output && python3 scripts/build_html.py --template templates/deed_motors_PC_v3_template.html --db scripts/price_db.json --out output/deed_motors_PC_latest.html
        continue-on-error: true
      - name: HTML生成（バイリンガル版）
        run: python3 scripts/build_html.py --template templates/deed_motors_PC_v3_BILINGUAL_template.html --db scripts/price_db.json --out output/deed_motors_PC_BILINGUAL_latest.html
        continue-on-error: true
      - name: コミット＆プッシュ
        run: |
          git config user.name "DEED MOTORS Bot"
          git config user.email "bot@deed-motors.mn"
          git add -A
          git diff --staged --quiet || git commit -m "価格データ更新 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push --force-with-lease
